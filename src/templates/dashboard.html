<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Spikes Detection in Workstations | Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --text: #f1f5f9;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
        }

        .unit {
            font-size: 18px;
            color: #64748b;
            margin-left: 5px;
        }

        .chart-container {
            grid-column: span 2;
            height: 400px;
        }

        @media (max-width: 768px) {
            .chart-container {
                grid-column: span 1;
            }
        }

        .prediction-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--accent);
        }

        .emergency .status-badge {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: var(--danger);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body id="dashboard-body">
    <header>
        <div class="logo">
            <span>🔥</span> Temperature Spikes Detection in Workstations
        </div>
        <div id="status" class="status-badge">SYSTEM NORMAL</div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">CPU Temperature</div>
            <div class="card-value"><span id="cpu-temp">--</span><span class="unit">°C</span></div>
        </div>
        <div class="card">
            <div class="card-title">Predictive Forecast</div>
            <div id="ttc-card" class="card-value">
                <span id="ttc-value">STABLE</span>
            </div>
            <div style="font-size: 12px; color: #64748b; margin-top: 5px;">Time to Critical (85°C)</div>
        </div>
        <div class="card">
            <div class="card-title">CPU Usage</div>
            <div class="card-value"><span id="cpu-usage">--</span><span class="unit">%</span></div>
        </div>
        <div class="card">
            <div class="card-title">Throttling</div>
            <div id="throttle-status" class="card-value" style="font-size: 24px;">NONE</div>
        </div>

        <div class="card chart-container">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <div class="card-title">Top Culprit Process</div>
            <div id="culprit" class="card-value" style="font-size: 18px; color: var(--accent);">--</div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CPU Temperature (°C)',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: false,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        function updateData() {
            fetch('/api/metrics')
                .then(response => response.json())
                .then(data => {
                    // Update Values
                    document.getElementById('cpu-temp').innerText = data.temperature.toFixed(1);
                    document.getElementById('cpu-usage').innerText = data.cpu_usage.toFixed(0);
                    document.getElementById('status').innerText = data.state;
                    document.getElementById('throttle-status').innerText = data.is_throttling ? "ACTIVE" : "NONE";
                    document.getElementById('throttle-status').style.color = data.is_throttling ? "var(--warning)" : "var(--text)";
                    
                    if (data.top_processes && data.top_processes.length > 0) {
                        document.getElementById('culprit').innerText = data.top_processes[0].name;
                    }

                    // Update TTC
                    const ttcVal = document.getElementById('ttc-value');
                    if (data.ttc === null) {
                        ttcVal.innerText = "STABLE";
                        ttcVal.style.color = "var(--text)";
                    } else if (data.ttc === 0) {
                        ttcVal.innerText = "CRITICAL";
                        ttcVal.style.color = "var(--danger)";
                    } else {
                        ttcVal.innerText = Math.round(data.ttc) + "s";
                        ttcVal.style.color = data.ttc < 30 ? "var(--danger)" : "var(--warning)";
                    }

                    // Update Badge Color
                    const body = document.getElementById('dashboard-body');
                    if (data.state === 'EMERGENCY' || data.state === 'SPIKE') {
                        header.parentElement.classList.add('emergency');
                    } else {
                        header.parentElement.classList.remove('emergency');
                    }

                    // Update Chart
                    const now = new Date().toLocaleTimeString();
                    tempChart.data.labels.push(now);
                    tempChart.data.datasets[0].data.push(data.temperature);
                    
                    if (tempChart.data.labels.length > 20) {
                        tempChart.data.labels.shift();
                        tempChart.data.datasets[0].data.shift();
                    }
                    tempChart.update('none');
                })
                .catch(err => console.error('Error fetching metrics:', err));
        }

        setInterval(updateData, 1000);
    </script>
</body>
</html>
